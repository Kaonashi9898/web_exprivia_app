<VirtualHost *:8444>
    ServerName prenotazioniexpba.exptraining.it

    SSLEngine on
    SSLCertificateFile /etc/ssl/exptraining/fullchain.crt
    SSLCertificateKeyFile /etc/ssl/exptraining/private.key

    ProxyRequests Off
    ProxyPreserveHost Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "8082"

    # API utenti-service: frontend chiama /api-utenti/api/...
    ProxyPass        /api-utenti/ http://127.0.0.1:13030/
    ProxyPassReverse /api-utenti/ http://127.0.0.1:13030/

    # API location-service: frontend chiama /api-location/api/...
    ProxyPass        /api-location/ http://127.0.0.1:13040/
    ProxyPassReverse /api-location/ http://127.0.0.1:13040/

    # API prenotazioni-service: frontend chiama /api-prenotazioni/api/...
    ProxyPass        /api-prenotazioni/ http://127.0.0.1:13050/
    ProxyPassReverse /api-prenotazioni/ http://127.0.0.1:13050/

    # Editor planimetria Angular, servito dal container sotto /editor/
    RedirectMatch 302 ^/editor$ /editor/
    ProxyPass        /editor/ http://127.0.0.1:13020/editor/
    ProxyPassReverse /editor/ http://127.0.0.1:13020/editor/

    # Frontend principale Angular
    ProxyPass        / http://127.0.0.1:13010/
    ProxyPassReverse / http://127.0.0.1:13010/

    ErrorLog ${APACHE_LOG_DIR}/prenotazioniExpBA-8444-error.log
    CustomLog ${APACHE_LOG_DIR}/prenotazioniExpBA-8444-access.log combined
</VirtualHost>
